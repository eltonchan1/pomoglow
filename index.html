<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>pomoglow</title>
		<meta name="description" content="Simple Pomodoro Timer">
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<p class="pomoglow-title">pomoglow</p>
		<div class="firefly-counter" title="Fireflies released">
			<img src="/assets/fireflysmiley.png" alt="Firefly" class="counter-icon">
			<span id="fireflyCount">0</span>
		</div>
		<div class="container">
			<div class="header">
				<div class="header-center">
					<div class="session-type" id="sessionType">focus</div>
					<div class="timer-display" id="timerDisplay">25:00</div>
				</div>
			</div>
			
			<div class="jar-container">
				<img src="/assets/jar.png" alt="Pomodoro Jar" class="jar-image">
			</div>
		</div>

		<div class="controls">
			<button id="settingsBtn" class="btn btn-secondary" title="settings">
				<img src="assets/settings.png" alt="Settings" class="settings-icon">
			</button>
			<button id="startBtn" class="btn btn-primary" title="start">
				<img src="assets/start.png" alt="Start" class="start-icon">
			</button>
			<button id="pauseBtn" class="btn btn-secondary" disabled title="pause">
				<img src="assets/pause.png" alt="Pause" class="pause-icon">
			</button>
			<button id="resetBtn" class="btn btn-secondary" title="reset">
				<img src="assets/reset.png" alt="Reset" class="reset-icon">
			</button>
			<button id="skipBtn" class="btn btn-secondary" title="skip">
				<img src="assets/skip.png" alt="Skip" class="skip-icon">
			</button>
		</div>

		<div id="settingsMenu" class="settings-menu hidden">
			<div class="settings-content">
				<h3>Settings</h3>

				<div class="setting-item">
					<label>focus length (minutes)</label>
					<input type="number" id="focusLength" min="1" max="60" value="25">
				</div>

				<div class="setting-item">
					<label>break length (minutes)</label>
					<input type="number" id="breakLength" min="1" max="30" value="5">
				</div>

				<div class="setting-item">
					<label>
						<input type="checkbox" id="muteNotif" unchecked>
						mute notifications
					</label>
				</div>
				<button id="closeSettings" class="close-settings">Close</button>
			</div>
		</div>
        <script src="script.js"></script>
	</body>
</html>
